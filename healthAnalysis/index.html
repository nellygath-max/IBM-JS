<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Analysis Data</title>
  <link rel="stylesheet" href="./health_analysis.css">
</head>
<body>
  <nav>
    <h1>Health Analysis Census</h1>
    <ul>
      <li><a href="./index.html" id="home">Home</a></li>
      <li><a href="./health_contact.html" id="contact">Contact Us</a></li>
      <li>
        <input type="text" id="conditionInput" placeholder="Enter a health condition">
        <button id="btnSearch">Search</button>
      </li>
    </ul>
  </nav>

  <div class="container">

    <!-- Patient analysis form (left column) -->
    <div class="analysisForm">
      <h1>Healthcare Data Analysis</h1>

      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Patient name">
      </div>

      <div class="form-group">
        <label>Gender:</label>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="Male">
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="Female">
      </div>

      <div class="form-group">
        <label for="age">Age:</label>
        <input type="number" id="age" placeholder="Age" min="0">
      </div>

      <div class="form-group">
        <label for="condition">Condition:</label>
        <select id="condition">
          <option value="">Select condition</option>
          <option value="Diabetes">Diabetes</option>
          <option value="Thyroid">Thyroid</option>
          <option value="High Blood Pressure">High Blood Pressure</option>
        </select>
      </div>

      <button id="addPatient">Add Patient</button>

      <h2>Analysis Report</h2>
      <div id="report"></div>
    </div>

    <!-- Search results (right column) -->
    <div class="searchCondition">
      <div id="result"></div>
    </div>

  </div>

  <!-- Condition cards section -->
  <div id="conditions"></div>

  <script src="./health_analysis.js"></script>
</body>
</html>
